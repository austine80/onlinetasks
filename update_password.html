<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password | Online Tasks & Surveys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .btn-success {
            background: linear-gradient(135deg, #16a34a, #15803d);
            border: none;
            transition: opacity 0.2s;
        }

        .btn-success:hover {
            opacity: 0.9;
        }

        .form-control:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 0.2rem rgba(22, 163, 74, 0.2);
        }
    </style>
</head>

<body>
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card shadow-lg border-0 rounded-4" style="max-width: 450px; width: 100%;">
            <div class="card-body p-4 p-md-5">
                <h1 class="text-center text-success fw-bold mb-2">NEW PASSWORD</h1>
                <h5 class="text-center text-muted mb-4">Enter and confirm your new password</h5>

                <form id="updateForm" autocomplete="off">
                    <!-- New Password -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">New Password</label>
                        <div class="input-group">
                            <input type="password" id="newPassword" class="form-control form-control-lg"
                                placeholder="Enter new password" required>
                            <button class="btn btn-outline-secondary" type="button" id="toggleNew">Show</button>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirm Password</label>
                        <div class="input-group">
                            <input type="password" id="confirmPassword" class="form-control form-control-lg"
                                placeholder="Confirm new password" required>
                            <button class="btn btn-outline-secondary" type="button" id="toggleConfirm">Show</button>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-success btn-lg w-100">
                        Update Password
                    </button>

                    <div class="text-center mt-3">
                        <p class="text-muted mb-0">Remember your password?
                            <a href="login.html" class="text-success fw-semibold text-decoration-none">Login</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div class="modal fade" id="customAlert" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-success">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title fw-bold">Online Tasks & Surveys</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="alertMessage"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>

    <script>
        // ─── Alert helper ────────────────────────────────────────────────────────────
        function showCustomAlert(message, redirect = false) {
            document.getElementById("alertMessage").textContent = message;
            const modal = new bootstrap.Modal(document.getElementById('customAlert'));
            modal.show();

            if (redirect) {
                setTimeout(() => {
                    modal.hide();
                    window.location.href = "login.html";
                }, 2000);
            }
        }

        function setLoading(isLoading) {
            const btn = document.getElementById("submitBtn");
            btn.disabled = isLoading;
            btn.textContent = isLoading ? "Updating…" : "Update Password";
        }

        // ─── Password toggles ─────────────────────────────────────────────────────────
        document.getElementById("toggleNew").addEventListener("click", function () {
            const field = document.getElementById("newPassword");
            const isPassword = field.type === "password";
            field.type = isPassword ? "text" : "password";
            this.textContent = isPassword ? "Hide" : "Show";
        });

        document.getElementById("toggleConfirm").addEventListener("click", function () {
            const field = document.getElementById("confirmPassword");
            const isPassword = field.type === "password";
            field.type = isPassword ? "text" : "password";
            this.textContent = isPassword ? "Hide" : "Show";
        });

        // ─── Supabase picks up the session from the reset link automatically ─────────
        // No extra code needed — when user clicks the email link, Supabase
        // sets a temporary session in the URL hash which the SDK reads on load.

        // ─── Form submit ──────────────────────────────────────────────────────────────
        document.getElementById("updateForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const newPassword = document.getElementById("newPassword").value.trim();
            const confirmPassword = document.getElementById("confirmPassword").value.trim();

            if (newPassword.length < 6) {
                showCustomAlert("Password must be at least 6 characters long.");
                return;
            }

            if (newPassword !== confirmPassword) {
                showCustomAlert("Passwords do not match. Please try again.");
                return;
            }

            setLoading(true);

            try {
                const { error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                showCustomAlert("Password updated successfully! Redirecting to login…", true);

            } catch (err) {
                console.error(err);

                // Most likely cause: link expired or already used
                if (err.message.toLowerCase().includes("session")) {
                    showCustomAlert("Reset link has expired. Please request a new one.");
                } else {
                    showCustomAlert("Failed to update password: " + err.message);
                }
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
