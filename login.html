<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Online Tasks & Surveys</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .btn-success {
            background: linear-gradient(135deg, #16a34a, #15803d);
            border: none;
            transition: opacity 0.2s;
        }

        .btn-success:hover {
            opacity: 0.9;
        }

        .form-control:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 0.2rem rgba(22, 163, 74, 0.2);
        }
    </style>
</head>

<body>
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card shadow-lg border-0 rounded-4" style="max-width: 450px; width: 100%;">
            <div class="card-body p-4 p-md-5">
                <h3 class="text-center text-success fw-bold mb-4">LOGIN</h3>

                <form id="loginForm" autocomplete="off">
                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" id="email" class="form-control form-control-lg"
                            placeholder="Enter your email" required autocomplete="email">
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <input type="password" id="password" class="form-control form-control-lg"
                                placeholder="Enter your password" required autocomplete="current-password">
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">Show</button>
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">Remember me</label>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-success btn-lg w-100">Login</button>

                    <div class="text-center mt-3">
                        <a href="reset_password.html" class="text-success text-decoration-none fw-semibold">
                            Forgot password?
                        </a>
                        <p class="text-muted mt-3 mb-0">Don't have an account?
                            <a href="register.html" class="text-success fw-semibold text-decoration-none">Register</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div class="modal fade" id="customAlert" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-success">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title fw-bold">Online Tasks & Surveys</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="alertMessage"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Your Supabase client initialiser (exposes `supabase` globally) -->
    <script src="supabaseClient.js"></script>

    <script>
        // ─── Utilities ───────────────────────────────────────────────────────────────

        function showCustomAlert(message, redirect = false) {
            document.getElementById("alertMessage").textContent = message;
            const modal = new bootstrap.Modal(document.getElementById("customAlert"));
            modal.show();

            if (redirect) {
                document.getElementById("customAlert").addEventListener("hidden.bs.modal", () => {
                    window.location.href = "dashboard.html";
                }, { once: true });
            }
        }

        function setLoading(isLoading) {
            const btn = document.getElementById("submitBtn");
            btn.disabled = isLoading;
            btn.textContent = isLoading ? "Logging in…" : "Login";
        }

        // ─── Password toggle ─────────────────────────────────────────────────────────

        document.getElementById("togglePassword").addEventListener("click", function () {
            const pwd = document.getElementById("password");
            const isPassword = pwd.type === "password";
            pwd.type = isPassword ? "text" : "password";
            this.textContent = isPassword ? "Hide" : "Show";
        });

        // ─── Remember Me: pre-fill email on load ─────────────────────────────────────

        window.addEventListener("load", () => {
            const remembered = localStorage.getItem("rememberUser");
            if (remembered) {
                document.getElementById("email").value = remembered;
                document.getElementById("rememberMe").checked = true;
            }
        });

        // ─── Login ───────────────────────────────────────────────────────────────────

        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const rememberMe = document.getElementById("rememberMe").checked;

            setLoading(true);

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                if (error) throw error;

                // ── Remember Me ──
                if (rememberMe) {
                    localStorage.setItem("rememberUser", email);
                } else {
                    localStorage.removeItem("rememberUser");
                }

                showCustomAlert("Login successful! Redirecting…", true);

            } catch (err) {
                console.error("Login error:", err);

                const msg = err?.message || "";

                if (msg.toLowerCase().includes("invalid login credentials") ||
                    msg.toLowerCase().includes("invalid email or password")) {
                    showCustomAlert("Invalid email or password. Please try again.");
                } else if (msg.toLowerCase().includes("email not confirmed")) {
                    showCustomAlert("Please confirm your email address before logging in. Check your inbox.");
                } else {
                    showCustomAlert("Login failed: " + msg);
                }
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
