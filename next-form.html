<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Activated | Online Tasks & Surveys</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons@4.29.0/dist/feather.min.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>

    <style>
        .form-card {
            transition: box-shadow 0.3s ease;
        }

        .form-card:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Page loader */
        #page-loader {
            position: fixed;
            inset: 0;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        #page-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-ring {
            width: 40px;
            height: 40px;
            border: 4px solid #d1fae5;
            border-top-color: #059669;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50">

    <!-- Page Loader (shown while checking session) -->
    <div id="page-loader">
        <div class="loader-ring"></div>
    </div>

    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="form-card max-w-md w-full bg-white rounded-2xl shadow-lg p-8">
            <div class="text-center">
                <div class="mx-auto w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mb-5">
                    <i data-feather="check-circle" class="text-emerald-600 w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Account Activated!</h2>
                <p class="text-gray-600 mb-6">
                    Your basic account is now active. Complete your profile to start earning.
                </p>
            </div>

            <form id="profileForm" class="space-y-5">
                <div>
                    <label for="fullName" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g. Jane Doe"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                        required />
                </div>

                <div>
                    <label for="country" class="block text-sm font-medium text-gray-700 mb-1">Country</label>
                    <select id="country"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                        required>
                        <option value="">Select your country</option>
                        <option value="KE">Kenya</option>
                        <option value="UG">Uganda</option>
                        <option value="TZ">Tanzania</option>
                        <option value="RW">Rwanda</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div>
                    <label for="skills" class="block text-sm font-medium text-gray-700 mb-1">Primary Skill</label>
                    <select id="skills"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                        required>
                        <option value="">Choose a skill</option>
                        <option value="surveys">Online Surveys</option>
                        <option value="writing">Freelance Writing</option>
                        <option value="design">Graphic Design</option>
                        <option value="transcription">Transcription</option>
                        <option value="data">Data Entry</option>
                        <option value="social">Social Media Mgmt</option>
                    </select>
                </div>

                <!-- Error message -->
                <div id="errorMsg"
                    class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3"></div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg transition shadow-md flex items-center justify-center gap-2">
                    <span id="submitText">Start Earning Now</span>
                    <div id="submitSpinner" class="loader-ring hidden" style="width:20px;height:20px;border-width:3px;">
                    </div>
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="dashboard.html" class="text-emerald-600 hover:text-emerald-800 font-medium text-sm">
                    ← Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="fade-in bg-white rounded-lg shadow-xl w-full max-w-md mx-4 overflow-hidden">
            <div class="bg-emerald-600 py-4 px-6">
                <h2 class="text-white text-xl font-bold text-center">Online Tasks</h2>
            </div>
            <div class="p-6 text-center">
                <p class="text-gray-700">Profile saved! Redirecting to your tasks...</p>
            </div>
        </div>
    </div>

    <script>
        feather.replace();

        // ============ AUTH GUARD ============
        (async function () {
            const { data: { session } } = await supabaseClient.auth.getSession();

            // Hide loader
            document.getElementById('page-loader').classList.add('hidden');

            if (!session) {
                alert('Please log in first.');
                window.location.replace('login.html');
                return;
            }

            // Pre-fill name if already stored in Supabase user metadata
            const meta = session.user?.user_metadata || {};
            const existingName = meta.full_name || meta.name || '';
            if (existingName) {
                document.getElementById('fullName').value = existingName;
            }
        })();

        // ============ FORM SUBMISSION ============
        document.getElementById('profileForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const submitSpinner = document.getElementById('submitSpinner');
            const errorMsg = document.getElementById('errorMsg');

            // Show loading state
            submitBtn.disabled = true;
            submitText.textContent = 'Saving...';
            submitSpinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                // Re-confirm session is still valid
                const { data: { session } } = await supabaseClient.auth.getSession();

                if (!session) {
                    alert('Session expired. Please log in again.');
                    window.location.replace('login.html');
                    return;
                }

                const userId = session.user.id;
                const userEmail = session.user.email;

                const fullName = document.getElementById('fullName').value.trim();
                const country = document.getElementById('country').value;
                const skill = document.getElementById('skills').value;

                // Save profile to your 'Onlinetask Users' table
                const { error } = await supabaseClient
                    .from('Onlinetask Users')
                    .update({
                        full_name: fullName,
                        activated: true,
                        country: country,
                        skill: skill
                    })
                    .eq('id', userId);

                if (error) {
                    // If update fails (row may not exist yet), try upsert
                    const { error: upsertError } = await supabaseClient
                        .from('Onlinetask Users')
                        .upsert({
                            id: userId,
                            email: userEmail,
                            full_name: fullName,
                            activated: true,
                            country: country,
                            skill: skill
                        });

                    if (upsertError) throw upsertError;
                }

                // Show success modal and redirect
                document.getElementById('successModal').classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = 'finalpage.html';
                }, 2000);

            } catch (err) {
                console.error('Profile save error:', err);
                errorMsg.textContent = 'Failed to save profile: ' + (err.message || 'Please try again.');
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitText.textContent = 'Start Earning Now';
                submitSpinner.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
