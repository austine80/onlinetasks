<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Online Tasks & Surveys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .btn-success {
            background: linear-gradient(135deg, #16a34a, #15803d);
            border: none;
            transition: opacity 0.2s;
        }

        .btn-success:hover {
            opacity: 0.9;
        }

        .form-control:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 0.2rem rgba(22, 163, 74, 0.2);
        }
    </style>
</head>

<body>
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card shadow-lg border-0 rounded-4" style="max-width: 450px; width: 100%;">
            <div class="card-body p-4 p-md-5">
                <h1 class="text-center text-success fw-bold mb-2">RESET PASSWORD</h1>
                <h5 class="text-center text-muted mb-4">Enter your email and we'll send you a reset link</h5>

                <form id="resetForm" autocomplete="off">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Registered Email Address</label>
                        <input type="email" id="email" class="form-control form-control-lg"
                            placeholder="Enter your registered email" required>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-success btn-lg w-100">
                        Send Reset Link
                    </button>

                    <div class="text-center mt-3">
                        <p class="text-muted mb-0">Remember your password?
                            <a href="login.html" class="text-success fw-semibold text-decoration-none">Login</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div class="modal fade" id="customAlert" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-success">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title fw-bold">Online Tasks & Surveys</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="alertMessage"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>

    <script>
        function showCustomAlert(message) {
            document.getElementById("alertMessage").textContent = message;
            const modal = new bootstrap.Modal(document.getElementById('customAlert'));
            modal.show();
        }

        function setLoading(isLoading) {
            const btn = document.getElementById("submitBtn");
            btn.disabled = isLoading;
            btn.textContent = isLoading ? "Sending…" : "Send Reset Link";
        }

        document.getElementById("resetForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            setLoading(true);

            try {
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + "/update_password.html"
                });

                if (error) throw error;

                showCustomAlert("Reset link sent! Check your email inbox and click the link to set a new password.");

            } catch (err) {
                console.error(err);
                showCustomAlert("Failed to send reset link: " + err.message);
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
